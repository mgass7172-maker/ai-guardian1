<html lang="ru">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #08090f;
  --surface:  #0e1018;
  --card:     #13151e;
  --border:   #1c1f2e;
  --border2:  #252840;
  --text:     #eef0f8;
  --text2:    #8b90ad;
  --text3:    #4a4f6a;
  --accent:   #4f6ef7;
  --accent2:  #7c5cfc;
  --wb:       #ff0066;
  --green:    #22c55e;
  --r: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* ─── Shell ─── */
.shell {
  width: 460px;
  height: 800px;
  background: var(--surface);
  border-radius: 24px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 32px 80px rgba(0,0,0,.8),
    0 0 120px rgba(79,110,247,.06);
}

/* ─── Header ─── */
.header {
  padding: 0 18px;
  height: 62px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d0f1a 0%, #0b0d16 100%);
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 100% at 10% 50%,
    rgba(79,110,247,.08) 0%, transparent 70%);
  pointer-events: none;
}

.logo-img {
  height: 26px;
  width: auto;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.h-divider {
  width: 1px;
  height: 22px;
  background: var(--border2);
  flex-shrink: 0;
  z-index: 1;
}

.h-center {
  display: flex;
  flex-direction: column;
  z-index: 1;
}
.h-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.h-sub {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
}
.h-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.h-status {
  font-size: 10.5px;
  color: var(--text2);
}
.h-badge {
  margin-left: auto;
  z-index: 1;
  font-size: 10px;
  color: var(--text3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 3px 9px;
  letter-spacing: .02em;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0 6px;
  gap: 2px;
}
.tab {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--text3);
  font-size: 10.5px;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s, background .15s;
  border-radius: 8px 8px 0 0;
}
.tab .ti { font-size: 16px; }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(79,110,247,.05);
}
.tab:hover:not(.active) {
  color: var(--text2);
  background: rgba(255,255,255,.02);
}

/* ─── Messages ─── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 6px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 10px;
}

/* ─── Bubble ─── */
.msg {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-width: 82%;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.bot  { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.58;
  word-break: break-word;
  white-space: pre-wrap;
  border-radius: 16px;
}
.bot .bubble {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 5px;
}
.user .bubble {
  background: linear-gradient(135deg, #3d5ce8, #5b3de8);
  color: #fff;
  border-bottom-right-radius: 5px;
  border: 1px solid rgba(255,255,255,.06);
}
.mtime {
  font-size: 10px;
  color: var(--text3);
  padding: 0 4px;
}
.bot .mtime  { text-align: left; }
.user .mtime { text-align: right; }

/* ─── Source tag ─── */
.src-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  font-size: 10px;
  color: var(--accent);
  background: rgba(79,110,247,.08);
  border: 1px solid rgba(79,110,247,.15);
  border-radius: 20px;
  padding: 2px 8px;
}

/* ─── Typing ─── */
.typing {
  display: flex; gap: 4px; align-items: center; padding: 6px 2px;
}
.typing span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity:.4; }
  30% { transform: translateY(-5px); opacity:1; }
}

/* ─── Quick buttons ─── */
.quick {
  padding: 8px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.qbtn {
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
  line-height: 1.3;
}
.qbtn:hover {
  background: rgba(79,110,247,.12);
  border-color: var(--accent);
  color: var(--accent);
}

/* ─── Input ─── */
.input-wrap {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 8px 8px 8px 14px;
  transition: border-color .15s;
}
.input-row:focus-within {
  border-color: rgba(79,110,247,.5);
  box-shadow: 0 0 0 3px rgba(79,110,247,.08);
}
.input-row input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  line-height: 1.4;
  min-width: 0;
}
.input-row input::placeholder { color: var(--text3); }
.send-btn {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #4f6ef7, #7c5cfc);
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .12s, transform .1s;
}
.send-btn:hover { opacity: .9; transform: scale(1.04); }
.send-btn:disabled { opacity: .3; cursor: default; transform: none; }

/* ─── Dossier panel ─── */
.dos-panel {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  overflow-y: auto;
}
.dos-row {
  display: flex; gap: 8px;
}
.dos-row input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  padding: 9px 13px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.dos-row input:focus { border-color: rgba(79,110,247,.5); }
.dos-row button {
  padding: 9px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  background: linear-gradient(135deg, #4f6ef7, #7c5cfc);
  color: #fff;
  border: none;
  cursor: pointer;
  font-family: inherit;
}
.dos-hint {
  font-size: 11px;
  color: var(--text3);
}
.dos-hint a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}
.dos-hint a:hover { text-decoration: underline; }

/* ─── Card ─── */
.info-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-name { font-size: 15px; font-weight: 600; color: var(--text); }
.card-sub  { font-size: 11px; color: var(--text2); margin-top: 2px; }
.badge {
  font-size: 10.5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.badge-ok  { background: rgba(34,197,94,.12); color: #22c55e; border: 1px solid rgba(34,197,94,.2); }
.badge-bad { background: rgba(255,0,102,.1);  color: #ff4d8b; border: 1px solid rgba(255,0,102,.2); }
.badge-mid { background: rgba(245,166,35,.1); color: #f5a623; border: 1px solid rgba(245,166,35,.2); }

.src-row { display: flex; flex-wrap: wrap; gap: 5px; }
.src-chip {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(79,110,247,.07);
  border: 1px solid var(--border2);
  color: var(--text2);
}

.field-list { display: flex; flex-direction: column; gap: 0; }
.field {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
}
.field:last-child { border: none; }
.field-l { color: var(--text2); }
.field-v { font-weight: 500; color: var(--text); }

.bar-block { padding: 7px 0; border-bottom: 1px solid var(--border); }
.bar-top {
  display: flex; justify-content: space-between;
  font-size: 12px; margin-bottom: 5px;
}
.bar-track {
  height: 4px; border-radius: 4px;
  background: var(--border2); overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width .6s ease;
}
.fill-ok  { background: #22c55e; }
.fill-mid { background: #f5a623; }
.fill-bad { background: #ff4d8b; }

.rec-box {
  padding: 10px 12px;
  border-radius: 10px;
  background: rgba(79,110,247,.06);
  border: 1px solid rgba(79,110,247,.12);
}
.rec-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.rec-text  { font-size: 12.5px; color: var(--text); line-height: 1.5; }

/* ─── Loading ─── */
.spin {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2); padding: 8px 0;
}
</style>
</head>

const MODE_TAB = [0, null, 2, 3]; // panel index → mode key index
const MODE_KEY = ['client', null, 'operator', 'newbie'];
let currentTab = 0;
let history = [];
let loading = false;

// ═══════════════════════════════════════════════
//  UI УТИЛИТЫ
// ═══════════════════════════════════════════════
function now() {
  return new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
}

function setStatus(on, text) {
  document.getElementById('hd').style.background = on ? '#22c55e' : '#f43f5e';
  document.getElementById('hst').textContent = text;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/
/g,'<br>');
}

function addMsg(chatId, html, role) {
  const box = document.getElementById(chatId);
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="bubble">${html}</div><div class="mtime">${now()}</div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

function showTyping(chatId) {
  const box = document.getElementById(chatId);
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing-' + chatId;
  wrap.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function removeTyping(chatId) {
  const el = document.getElementById('typing-' + chatId);
  if (el) el.remove();
}

function renderQuick(tabIdx) {
  const modeKey = MODE_KEY[tabIdx];
  if (!modeKey) return;
  const container = document.getElementById('q' + tabIdx);
  if (!container) return;
  container.innerHTML = '';
  (QUICK[modeKey] || []).forEach(([label, val]) => {
    const b = document.createElement('button');
    b.className = 'qbtn';
    b.textContent = label;
    b.onclick = () => { document.getElementById('i' + tabIdx).value = val; send(tabIdx); };
    container.appendChild(b);
  });
}

function switchTab(n) {
  currentTab = n;
  history = [];
  [0,1,2,3].forEach(i => {
    document.getElementById('p'+i).style.display = i===n ? 'flex' : 'none';
    document.getElementById('t'+i).classList.toggle('active', i===n);
  });
}

// ═══════════════════════════════════════════════
//  API ВЫЗОВ
// ═══════════════════════════════════════════════
async function callAPI(tabIdx, userText) {
  const modeKey = MODE_KEY[tabIdx] || 'client';
  history.push({ role:'user', content: userText });
  if (history.length > 20) history = history.slice(-20);

  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: buildSystem(modeKey),
      messages: history
    })
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  const reply = data.content?.[0]?.text || data.error || 'Ошибка';
  history.push({ role:'assistant', content: reply });
  return reply;
}

// ═══════════════════════════════════════════════
//  ОТПРАВКА СООБЩЕНИЯ
// ═══════════════════════════════════════════════
async function send(tabIdx) {
  if (loading) return;
  const inp = document.getElementById('i' + tabIdx);
  const btn = document.getElementById('b' + tabIdx);
  const chatId = 'm' + tabIdx;
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  loading = true;
  if (btn) btn.disabled = true;

  addMsg(chatId, fmt(text), 'user');
  showTyping(chatId);
  setStatus(true, 'Думает…');

  try {
    const reply = await callAPI(tabIdx, text);
    removeTyping(chatId);
    const srcLabel = tabIdx === 0 ? '🛡️ AI Guardian'
                   : tabIdx === 2 ? '📋 База регламентов'
                   : '🎓 База адаптации';
    addMsg(chatId,
      fmt(reply) + `<div><span class="src-tag">${srcLabel}</span></div>`,
      'bot');
    setStatus(true, 'Онлайн');
  } catch(e) {
    removeTyping(chatId);
    addMsg(chatId, '⚠️ ' + e.message, 'bot');
    setStatus(false, 'Ошибка');
  }

  loading = false;
  if (btn) btn.disabled = false;
}

      : d.can_self_unblock===false

    out.innerHTML = `

          <div>

            <div class="card-sub">${id} · ${d.since}</div>

            <div class="bar-top"><span style="color:var(--text2)">Антифрод-риск</span><span style="color:var(--text)">${riskPct}%</span></div>
