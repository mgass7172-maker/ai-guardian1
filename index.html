<!DOCTYPE html>

<title>wbank · AI Guardian</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0c14;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 12px;
}
.shell {
  width: 480px; height: 780px;
  background: #13151f;
  border-radius: 20px;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  border: 1px solid #1e2235;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #050d1a, #091428);
  padding: 0 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #1a2235;
  flex-shrink: 0; height: 58px; position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(21,101,192,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.wbank-logo { display: flex; align-items: center; gap: 0; flex-shrink: 0; z-index: 1; }
.wbank-img { height: 28px; width: auto; object-fit: contain; display: block; }
.hdivider { width: 1px; height: 26px; background: #1e2d45; margin: 0 12px; flex-shrink: 0; z-index:1; }
.hinfo { z-index: 1; display: flex; align-items: center; gap: 7px; }
.hstatus { display: flex; align-items: center; gap: 5px; }
.hstatus-text { color: #ffffff; font-size: 12px; font-weight: 400; white-space: nowrap; }
.pulse { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.hbadge {
  margin-left: auto; font-size: 10px; color: rgba(107,159,212,0.7);
  border: 1px solid rgba(107,159,212,0.15); border-radius: 8px; padding: 2px 7px; z-index: 1; white-space: nowrap;
}

/* ── Mode tabs ── */
.modes {
  display: flex; border-bottom: 1px solid #1e2235; flex-shrink: 0;
  background: #0f1120;
}
.mode-btn {
  flex: 1; padding: 9px 4px; font-size: 11px; text-align: center;
  cursor: pointer; color: #4a5580; border: none; background: none;
  border-bottom: 2px solid transparent; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.mode-btn .micon { font-size: 15px; }
.mode-btn.active { color: #4a90d9; border-bottom-color: #1565c0; background: rgba(21,101,192,0.06); }
.mode-btn:hover:not(.active) { color: #6b9fd4; background: rgba(255,255,255,0.02); }

/* ── Messages ── */
.messages {
  flex: 1; padding: 12px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: #1e2235; border-radius: 2px; }

.msg { max-width: 84%; display: flex; flex-direction: column; gap: 3px; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble {
  padding: 9px 13px; border-radius: 14px;
  font-size: 13px; line-height: 1.55; word-break: break-word;
  white-space: pre-wrap;
}
.bot .bubble {
  background: #1a1e30; color: #c8d4e8;
  border: 1px solid #252a40;
  border-bottom-left-radius: 4px;
}
.user .bubble {
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: #fff; border-bottom-right-radius: 4px;
}
.mtime { font-size: 10px; color: #3a4060; padding: 0 4px; }
.bot .mtime { text-align: left; }
.user .mtime { text-align: right; }

/* source badge */
.src { display: inline-flex; align-items: center; gap: 3px; margin-top: 5px;
  font-size: 10px; background: rgba(21,101,192,.15); color: #4a90d9;
  border: 1px solid rgba(21,101,192,.2); border-radius: 8px; padding: 2px 7px; }

/* typing */
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: #3a6fa8;
  animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* card blocks inside messages */
.info-card {
  background: #0f1220; border: 1px solid #252a40; border-radius: 10px;
  padding: 10px 12px; margin-top: 6px; font-size: 12px;
}
.info-card .card-title { color: #6b9fd4; font-size: 10px; text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 6px; }
.info-row { display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid #1a1e2e; font-size: 12px; }
.info-row:last-child { border: none; }
.info-label { color: #4a5580; }
.info-val { color: #c8d4e8; font-weight: 500; }
.badge-ok { background: rgba(76,175,80,.15); color: #66bb6a; border: 1px solid rgba(76,175,80,.2); border-radius: 8px; padding: 1px 7px; font-size: 10px; }
.badge-warn { background: rgba(255,152,0,.12); color: #ffa726; border: 1px solid rgba(255,152,0,.2); border-radius: 8px; padding: 1px 7px; font-size: 10px; }
.badge-bad { background: rgba(239,83,80,.12); color: #ef5350; border: 1px solid rgba(239,83,80,.2); border-radius: 8px; padding: 1px 7px; font-size: 10px; }

/* ── Quick buttons ── */
.quick { padding: 6px 12px 8px; display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; }
.qbtn {
  background: #161928; border: 1px solid #252a40;
  border-radius: 16px; color: #4a90d9; font-size: 11px;
  padding: 4px 10px; cursor: pointer; transition: all .12s;
}
.qbtn:hover { background: #1565c0; border-color: #1565c0; color: #fff; }

/* ── Input ── */
.input-row {
  padding: 10px 12px; background: #0f1120; border-top: 1px solid #1a1e2e;
  display: flex; gap: 7px; flex-shrink: 0;
}
.input-row input {
  flex: 1; background: #1a1e30; border: 1px solid #252a40;
  border-radius: 10px; color: #c8d4e8; padding: 9px 13px;
  font-size: 13px; outline: none; font-family: inherit;
}
.input-row input:focus { border-color: #1565c0; }
.input-row input::placeholder { color: #3a4060; }
.send-btn {
  background: #1565c0; border: none; border-radius: 10px;
  width: 40px; height: 40px; cursor: pointer; color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background .12s;
}
.send-btn:hover { background: #1976d2; }
.send-btn:disabled { opacity: .35; cursor: default; }
</style>

//  СОСТОЯНИЕ

let currentMode = 'client';
let history = [];
let loading = false;

// ═══════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════
function setStatus(on, txt) {
  document.getElementById('pulse').style.background = on ? '#4caf50' : '#f44336';
  const el = document.getElementById('stxt'); if(el) el.textContent = txt;
}

function now() {
  return new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
}

function addMsg(html, role) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="bubble">${html}</div><div class="mtime">${now()}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function renderQuick(mode) {
  const q = document.getElementById('quick');
  q.innerHTML = '';
  (QUICK[mode] || []).forEach(([label, val]) => {
    const b = document.createElement('button');
    b.className = 'qbtn'; b.textContent = label;
    b.onclick = () => { document.getElementById('inp').value = val; send(); };
    q.appendChild(b);
  });
}

function setMode(mode) {
  currentMode = mode;
  history = [];
  ['client','operator','newbie','hr'].forEach(m => {
    document.getElementById('m-'+m).classList.toggle('active', m === mode);
  });
  document.getElementById('messages').innerHTML = '';
  renderQuick(mode);
  const w = WELCOME[mode];
  addMsg(fmt(w), 'bot');
}

// ═══════════════════════════════════════════════════════════
//  API CALL
// ═══════════════════════════════════════════════════════════
async function send() {
  if (loading) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  document.getElementById('sbtn').disabled = true;
  loading = true;

  addMsg(fmt(text), 'user');
  const t = showTyping();
  setStatus(true, 'Анализирует запрос…');

  history.push({ role: 'user', content: text });
  if (history.length > 20) history = history.slice(-20);

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1200,
        system: buildSystem(currentMode),
        messages: history
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || data.error || 'Ошибка ответа';
    history.push({ role: 'assistant', content: reply });

    document.getElementById('typing')?.remove();
    const srcMap = { client: '🛡️ wbank · AI Guardian', operator: '🎧 Оператор-мод', newbie: '🎓 Адаптация', hr: '📋 HR-база' };
    addMsg(fmt(reply) + `<div class="src">${srcMap[currentMode]}</div>`, 'bot');
    setStatus(true, 'Онлайн • Claude Sonnet');
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('⚠️ Ошибка: ' + e.message, 'bot');
    setStatus(false, 'Ошибка соединения');
  }

  loading = false;
  document.getElementById('sbtn').disabled = false;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
setMode('client');
