<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Guardian</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f1117;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 16px;
}
.chat-container {
  width: 440px; height: 700px;
  background: #1a1d27; border-radius: 18px;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.chat-header {
  background: linear-gradient(135deg, #1e3a5f, #0d47a1);
  padding: 16px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.h-avatar {
  width: 42px; height: 42px; background: rgba(255,255,255,0.15);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.h-info h2 { color: #fff; font-size: 15px; font-weight: 600; }
.h-info span { color: #90caf9; font-size: 11px; }
.h-status { display: flex; align-items: center; gap: 5px; }
.pulse { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.h-model {
  margin-left: auto; font-size: 10px; color: rgba(144,202,249,0.7);
  border: 1px solid rgba(144,202,249,0.25); border-radius: 10px; padding: 3px 8px;
}
.messages {
  flex: 1; padding: 14px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 82%; padding: 10px 14px; border-radius: 14px;
  font-size: 13.5px; line-height: 1.55; word-break: break-word;
}
.msg.bot {
  background: #252836; color: #dde3f0; align-self: flex-start;
  border-bottom-left-radius: 4px; border: 1px solid #2e3245;
}
.msg.user {
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: #fff; align-self: flex-end; border-bottom-right-radius: 4px;
}
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: #4a90d9;
  animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay:.2s }
.typing-dots span:nth-child(3) { animation-delay:.4s }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
.quick-btns {
  padding: 0 14px 10px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
}
.qbtn {
  background: #252836; border: 1px solid #3a3d50; border-radius: 20px;
  color: #90caf9; font-size: 11px; padding: 5px 11px; cursor: pointer; transition: all .15s;
}
.qbtn:hover { background: #1565c0; border-color: #1565c0; color: #fff; }
.input-area {
  padding: 12px 14px; background: #1a1d27; border-top: 1px solid #252836;
  display: flex; gap: 8px; flex-shrink: 0;
}
.input-area textarea {
  flex: 1; background: #252836; border: 1px solid #3a3d50; border-radius: 10px;
  color: #dde3f0; padding: 10px 13px; font-size: 13px; resize: none;
  height: 42px; outline: none; font-family: inherit; transition: border-color .15s;
}
.input-area textarea:focus { border-color: #2196f3; }
.send-btn {
  background: #1565c0; border: none; border-radius: 10px;
  width: 42px; height: 42px; cursor: pointer; color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0;
}
.send-btn:hover { background: #1976d2; }
.send-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="h-avatar">🛡️</div>
    <div class="h-info">
      <h2>AI Guardian</h2>
      <div class="h-status">
        <div class="pulse" id="pulse"></div>
        <span id="status-txt">Онлайн • Цифровой ассистент</span>
      </div>
    </div>
    <div class="h-model">Claude Sonnet</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      Здравствуйте! Я <b>AI Guardian</b> — ваш цифровой ассистент.<br><br>
      Помогу с вопросами по кошельку, возвратам и рассрочке, а также отвечу на HR-вопросы сотрудников.
    </div>
  </div>

  <div class="quick-btns" id="quickBtns">
    <button class="qbtn" onclick="sendQuick('Заблокировали кошелёк, что делать?')">🔒 Блокировка</button>
    <button class="qbtn" onclick="sendQuick('Хочу вернуть средства')">💸 Возврат</button>
    <button class="qbtn" onclick="sendQuick('Как оформить отпуск?')">📅 Отпуск (HR)</button>
    <button class="qbtn" onclick="sendQuick('Вопрос по рассрочке')">📋 Рассрочка</button>
    <button class="qbtn" onclick="sendQuick('Как открыть больничный?')">🏥 Больничный</button>
    <button class="qbtn" onclick="sendQuick('Шаблон ответа клиенту на жалобу')">✉️ Шаблон жалобы</button>
  </div>

  <div class="input-area">
    <textarea id="inputField" placeholder="Напишите ваш вопрос…" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Ты — AI Guardian, цифровой ассистент для сотрудников и клиентов финтех-компании.

Отвечай строго на основе базы знаний ниже. Если вопрос не покрыт базой знаний — честно скажи об этом и предложи обратиться к руководителю или в соответствующий отдел.

Стиль: чёткие структурированные ответы с эмодзи, профессиональный но дружелюбный тон, язык русский.

=== БАЗА ЗНАНИЙ ===

--- HR-РЕГЛАМЕНТЫ ---
ОТПУСК: заявка в HR-портале за 14 дней, согласование руководителя, приказ на почту. Остаток дней — личный кабинет → «Мой отпуск».
БОЛЬНИЧНЫЙ: уведомить руководителя в первый день, загрузить скан в HR-портал после выздоровления. Пособие — 10 рабочих дней.
ЗАРПЛАТА: аванс 25-го (40%), основная часть 10-го следующего месяца. Расчётный листок — личный кабинет → «Выплаты».
ЭСКАЛАЦИЯ: клиент агрессивен → тег «Эскалация» в CRM + звонок супервизору. Время реакции — до 5 минут.

--- РАБОТА С КЛИЕНТАМИ ---
БЛОКИРОВКА КОШЕЛЬКА: уточнить причину, проверить антифрод по ID. Ошибочная блокировка — тикет «Разблокировка», снятие через 2 часа.
ВОЗВРАТ СРЕДСТВ: до 5000 ₽ — оператор сам, от 5000 до 50000 ₽ — супервизор, свыше 50000 ₽ — финотдел (до 10 дней). Тикет с тегом «Возврат».
РАССРОЧКА: сроки 3/6/12/24 месяца. 0% до 6 мес, от 6.9% свыше. Свыше 100000 ₽ — доп. документ (ИНН или СНИЛС).
ШАБЛОН ОТВЕТА НА ЖАЛОБУ: «Добрый день, [Имя]! Спасибо, что сообщили нам. Приносим извинения за неудобства. Ваше обращение зарегистрировано под номером [номер]. Ответим в течение 24 часов. С уважением, [Имя оператора]»

--- АДАПТАЦИЯ НОВЫХ СОТРУДНИКОВ ---
ПЕРВЫЙ ДЕНЬ: 09:00 HR+пропуск, 10:00 команда, 11:00 IT, после обеда — вводное обучение 3 дня. Обед за счёт компании первые 3 дня.
ДОСТУПЫ: логин/пароль на корпоративную почту. VPN: \\server\docs\IT\vpn-setup.pdf. Помощь: @it_help в Telegram.
ДРЕСС-КОД: деловой casual. Недопустимо: шорты, спортивная одежда.`;

let history = [];
let isLoading = false;

function setStatus(on, text) {
  document.getElementById('pulse').style.background = on ? '#4caf50' : '#f44336';
  document.getElementById('status-txt').textContent = text;
}

function appendMsg(html, type) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  return appendMsg('<div class="typing-dots"><span></span><span></span><span></span></div>', 'bot');
}

function fmt(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('quickBtns').style.display = 'none';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  appendMsg(fmt(text), 'user');
  const typingEl = showTyping();
  setStatus(true, 'Думает…');

  history.push({ role: 'user', content: text });
  if (history.length > 20) history = history.slice(-20);

  try {
    // Запрос идёт на наш сервер /api/chat, а не напрямую к Anthropic
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await resp.json();
    const reply = data.content?.[0]?.text || data.error || 'Ошибка ответа';
    history.push({ role: 'assistant', content: reply });

    typingEl.remove();
    appendMsg(fmt(reply), 'bot');
    setStatus(true, 'Онлайн • Claude Sonnet');
  } catch(e) {
    typingEl.remove();
    appendMsg('⚠️ Ошибка соединения: ' + e.message, 'bot');
    setStatus(false, 'Ошибка соединения');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendQuick(text) {
  document.getElementById('inputField').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
</script>
</body>
</html>
